<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340"><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker></defs><rect x="0" y="0" width="900" height="340" rx="16" fill="#f8fafc" stroke="#e2e8f0"/><text x="450" y="38" text-anchor="middle" font-size="19" font-weight="700" fill="#1e293b" font-family="'Segoe UI','DejaVu Sans',sans-serif">Модуль 1. Смена образовательной парадигмы</text><text x="450" y="60" text-anchor="middle" font-size="13" fill="#64748b" font-family="'Segoe UI','DejaVu Sans',sans-serif">от трансляции знаний — к развитию компетенций</text><rect x="70.0" y="92.0" width="300.0" height="96.0" rx="12" fill="#ffffff" stroke="#64748b" stroke-width="2"/><text x="220.0" y="131.0" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="600" fill="#1e293b" font-family="'Segoe UI','DejaVu Sans',sans-serif">Знаниевая парадигма (ЗУН): передача</text><text x="220.0" y="149.0" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="600" fill="#1e293b" font-family="'Segoe UI','DejaVu Sans',sans-serif">готовых знаний, ученик — объект</text><line x1="378.0" y1="140.0" x2="518.0" y2="140.0" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arr)"/><text x="448" y="124" text-anchor="middle" font-size="12" fill="#64748b" font-family="'Segoe UI','DejaVu Sans',sans-serif">смена парадигмы</text><rect x="526.0" y="92.0" width="300.0" height="96.0" rx="12" fill="#ffffff" stroke="#6366f1" stroke-width="2"/><text x="676.0" y="122.0" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="600" fill="#1e293b" font-family="'Segoe UI','DejaVu Sans',sans-serif">Компетентностная парадигма:</text><text x="676.0" y="140.0" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="600" fill="#1e293b" font-family="'Segoe UI','DejaVu Sans',sans-serif">способность действовать, ученик —</text><text x="676.0" y="158.0" text-anchor="middle" dominant-baseline="middle" font-size="14" font-weight="600" fill="#1e293b" font-family="'Segoe UI','DejaVu Sans',sans-serif">субъект</text><text x="450" y="232" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b" font-family="'Segoe UI','DejaVu Sans',sans-serif">Новые роли учителя русского языка</text><rect x="34.0" y="254.0" width="152.0" height="52.0" rx="12" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/><text x="110.0" y="280.0" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="600" fill="#1e293b" font-family="'Segoe UI','DejaVu Sans',sans-serif">Организатор</text><rect x="204.0" y="254.0" width="152.0" height="52.0" rx="12" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/><text x="280.0" y="280.0" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="600" fill="#1e293b" font-family="'Segoe UI','DejaVu Sans',sans-serif">Фасилитатор</text><rect x="374.0" y="254.0" width="152.0" height="52.0" rx="12" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/><text x="450.0" y="280.0" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="600" fill="#1e293b" font-family="'Segoe UI','DejaVu Sans',sans-serif">Тьютор</text><rect x="544.0" y="254.0" width="152.0" height="52.0" rx="12" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/><text x="620.0" y="280.0" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="600" fill="#1e293b" font-family="'Segoe UI','DejaVu Sans',sans-serif">Модератор</text><rect x="714.0" y="254.0" width="152.0" height="52.0" rx="12" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/><text x="790.0" y="280.0" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="600" fill="#1e293b" font-family="'Segoe UI','DejaVu Sans',sans-serif">Проектировщик</text></svg>