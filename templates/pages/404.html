{% extends 'base/base.html' %}
{% load i18n %}
{% block title %}404 — {% trans 'Not Found' %}{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px">
  <div>
    <div style="font-size:8rem;font-weight:900;background:var(--gradient-button);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1">404</div>
    <h2 style="margin-bottom:12px">{% trans 'Page Not Found' %}</h2>
    <p class="text-muted mb-6">{% trans "The page you're looking for doesn't exist." %}</p>
    <a href="/" class="btn btn-primary">🏠 {% trans 'Go Home' %}</a>
  </div>
</div>
{% endblock %}
